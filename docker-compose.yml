version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: pvreza_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: pvreza_backend
    restart: always
    ports:
      - "${EXPRESS_PORT}:3000"
    env_file:
      - .env
    depends_on:
      - db

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pvreza_phpmyadmin
    restart: always
    ports:
      - "${PHPMYADMIN_PORT}:80"
    environment:
      PMA_HOST: ${PMA_HOST}
      PMA_USER: ${PMA_USER}
      PMA_PASSWORD: ${PMA_PASSWORD}

volumes:
  db_data: